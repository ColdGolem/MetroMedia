<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metromedia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Welcome to Metromedia</h1>
  </header>

  <main>
    <section id="page1">
      <label for="city">Select City:</label>
      <select id="city"></select>

      <label for="line">Select Line:</label>
      <select id="line"></select>

      <button id="startBtn">Start Metromedia Chat</button>

      <!-- Banner ad on page1 -->
      <div id="page1Banner" class="ad-banner">
        <!-- AdSense banner will go here -->
      </div>
    </section>

    <section id="page2" style="display:none;">
      <!-- Chat overlay logic handled in app.js -->
      <div id="chatContainer"></div>
      <div id="overlay"></div>
      <button id="watchAdBtn">Watch Ad to Read Only</button>
      <button id="payBtn">Pay ₹10 for Full Day</button>

      <!-- Share button -->
      <button id="shareBtn" title="Share Metromedia">Share</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
