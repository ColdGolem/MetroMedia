<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroPulse</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Landing / Line Selection -->
  <div id="landing">
    <h1>MetroPulse</h1>
    <label for="lineSelect">Select your metro line:</label>
    <select id="lineSelect">
      <option value="blue">Blue Line</option>
      <option value="red">Red Line</option>
      <option value="green">Green Line</option>
    </select>
    <button id="proceedBtn">Proceed</button>
    <div id="crowdStatus">Crowd status: Unknown</div>
  </div>

  <!-- Access Selection -->
  <div id="access" class="hidden">
    <h2>Access Options</h2>
    <button id="payBtn">Pay ₹10 for full-day chat</button>
    <button id="adBtn">Watch ad for 10-min read-only</button>
    <div id="timer"></div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="hidden">
    <div id="chatHeader">
      <h2 id="lineName">Line Name</h2>
      <div id="crowdDisplay">Crowd: Unknown</div>
    </div>
    <div id="chatMessages"></div>
    <div id="chatInput">
      <input type="text" id="messageInput" placeholder="Type your message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
