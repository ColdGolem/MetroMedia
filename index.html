<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetroPulse 🚇</title>
<link rel="stylesheet" href="style.css">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- ADSENSE (Enable later) -->
<!--
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_ADSENSE_ID" crossorigin="anonymous"></script>
-->
</head>

<body>

<h1>🚇 MetroPulse</h1>
<p class="tag">Live commuter chat</p>

<!-- STEP 1: Select Metro Line -->
<div class="card" id="lineCard">
<h2>Select Metro Line</h2>
<select id="line">
<option>Blue Line</option>
<option>Yellow Line</option>
<option>Pink Line</option>
<option>Purple Line</option>
</select>
<br>
<button onclick="selectLine()">Next ➡️</button>
</div>

<!-- STEP 2: Report Crowd / Queries -->
<div class="card hidden" id="crowdCard">
<h2>Crowd Status / Queries</h2>
<p>How crowded is your coach?</p>
<button onclick="report('empty')">👍 Empty</button>
<button onclick="report('normal')">😐 Normal</button>
<button onclick="report('packed')">😵 Packed</button>
</div>

<!-- STEP 3: Unlock / Watch Ad / Chat -->
<div id="unlockBox" class="card hidden">
<h2>Enter Chat</h2>
<button onclick="watchAd()">🎬 Watch Ad</button>
<p class="small">Watch ad to read live chat</p>
</div>

<div id="chatArea" class="card hidden">
<h2>Live Chat</h2>
<div id="timer" class="timer"></div>

<div class="chat" id="chatBox">
<!-- Demo messages inserted by demo.js -->
</div>

<div class="ad">
Free users must watch ads to read chat.
<!--
<ins class="adsbygoogle"
style="display:block"
data-ad-client="YOUR_ADSENSE_ID"
data-ad-slot="YOUR_SLOT_ID"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
-->
</div>

<button onclick="payChat()">💬 Unlock Chat ₹10</button>
</div>

<footer>
MetroPulse Prototype<br>Contact: hello@metropulse.app
</footer>

<!-- Scripts -->
<script src="script.js"></script>
<script src="demo.js"></script>

<!-- Service Worker Registration -->
<script>
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
